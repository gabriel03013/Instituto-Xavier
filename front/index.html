<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Instituto Xavier</title>
    <link rel="stylesheet" href="assets/css/index.css" />
    <link rel="stylesheet" href="assets/css/globals.css" />
    <link
      rel="icon"
      href="../../assets/images/Group 14.svg"
      type="image/x-icon"
    />
  </head>

  <body>
    <main>
      <section id="formulario-login">
        <h1>- Login -</h1>

        <div>
          <form>
            <label for="usuario">
              Email ou Usuário
              <input id="user" type="text" />
            </label>

            <label for="senha">
              Senha
              <input id="senha" type="password" />
            </label>

            <div id="erro">
              <i class="fa-solid fa-exclamation"></i>

              <p>Email/Usuário ou senha incorretos!</p>
            </div>

            <p
              style="width: 100%; text-align: left; margin-top: 1rem; margin-bottom: 2rem"
            >
              <a
                href="#"
                id="abrir-modal-recuperacao"
                style="font-size: 1.5rem; color: #555; text-decoration: none"
                >Esqueceu a senha?</a
              > 
            </p>

            <button type="submit">Entrar</button>

            <p>
              É um aluno novo? <a href="pages/cadastro.html">Cadastre-se</a>
            </p>
          </form>
        </div>
      </section>

      <div id="modal-recuperacao" class="modal" style="display: none">
        <div class="conteudo-modal">
          <div class="cabecalho-modal">
            <h2>Recuperar Senha</h2>
            <button id="fechar-modal-recuperacao">&times;</button>
          </div>

          <div id="passo-recuperacao-1">
            <p>
              Insira seu email ou usuário para receber um link de recuperação
              (simulado no console).
            </p>
            <div class="grupo-entrada">
              <label for="email-recuperacao">Email ou Usuário</label>
              <input
                type="text"
                id="email-recuperacao"
                placeholder="email@exemplo.com"
              />
            </div>
            <button id="btn-solicitar-codigo" class="btn-primario">
              Solicitar Código
            </button>
          </div>

          <div id="passo-recuperacao-2" style="display: none">
            <p>Insira o código e sua nova senha.</p>
            <div class="grupo-entrada">
              <label for="codigo-recuperacao">Código de Recuperação</label>
              <input
                type="text"
                id="codigo-recuperacao"
                placeholder="Cole o código aqui"
              />
            </div>
            <div class="grupo-entrada">
              <label for="nova-senha-recuperacao">Nova Senha</label>
              <input
                type="password"
                id="nova-senha-recuperacao"
                placeholder="Mínimo 6 caracteres"
              />
            </div>
            <div class="grupo-entrada">
              <label for="confirmar-senha-recuperacao">Confirmar Senha</label>
              <input
                type="password"
                id="confirmar-senha-recuperacao"
                placeholder="Repita a nova senha"
              />
            </div>
            <button id="btn-redefinir-senha" class="btn-primario">
              Redefinir Senha
            </button>
          </div>

          <div
            id="mensagem-recuperacao"
            style="
              display: none;
              margin-top: 2rem;
              padding: 1rem;
              border-radius: 0.5rem;
              font-weight: bold;
            "
          ></div>
        </div>
      </div>

      <section id="visual">
        <img
          id="logo-instituto"
          src="assets/images/Group 14.svg"
          alt="logo instituto xavier"
        />

        <img
          id="efeito-esquerda"
          src="assets/images/Group 21.svg"
          alt="efeito esquerda"
        />

        <img
          id="efeito-direita-topo"
          src="assets/images/Group 22.svg"
          alt="efeito direita topo"
        />

        <img
          id="xavier"
          src="assets/images/image 9(1).svg"
          alt="efeito direita inferior"
        />

        <img
          id="efeito-direita-inferior"
          src="assets/images/Design_sem_nome-removebg-preview 3.svg"
          alt="efeito direita inferior"
        />
      </section>
    </main>

    <script
      src="https://kit.fontawesome.com/02db64e304.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="assets/js/index.js"></script>
    <script type="module" src="assets/js/recuperarSenha.js"></script>
  </body>
</html>
