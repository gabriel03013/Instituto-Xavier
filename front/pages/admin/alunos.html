<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alunos - Admin</title>
    <link rel="stylesheet" href="../../assets/css/globals.css" />
    <link rel="stylesheet" href="../../assets/css/adminGlobal.css" />
    <link
      rel="icon"
      href="../../assets/images/Group 14.svg"
      type="image/x-icon"
    />
  </head>
  <body>
    <header>
      <div>
        <img src="../../assets/images/Group 14.svg" alt="" />
        <ul>
          <li><a href="index.html">Início</a></li>
          <li><a href="turmas.html">Turmas</a></li>
          <li class="aba-admin-ativa">
            <a href="selecionarTurma.html">Alunos</a>
          </li>
          <li><a href="professores.html">Professores</a></li>
          <li><a href="disciplinas.html">Disciplinas</a></li>
        </ul>
      </div>
      <a href="../../index.html" class="btn-sair" id="btn-sair" onclick="localStorage.clear()">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
      </a>
    </header>

    <main>
      <div class="turma-header">
        <div id="admin-header-titulo-botao">
          <h1 class="turma-titulo"></h1>
          <button id="admin-adicionar">
            <i class="fa-solid fa-plus"></i>
            Adicionar Aluno
          </button>
        </div>

        <div class="admin-search">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input
            type="search"
            placeholder="Pesquisar aluno por nome ou matrícula"
          />
        </div>
      </div>

      <div class="admin-table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Matrícula</th>
              <th>Média 1º Sem</th>
              <th>Média 2º Sem</th>
              <th>Média Final</th>
              <th>Opções</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>

    <div class="admin-modal" id="modal-editar-aluno">
      <div>
        <div class="admin-modal-header">
          <h3>Editar Aluno</h3>
          <button class="fechar-modal">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <form class="admin-modal-content">
          <label for="editar-aluno-nome"
            >Nome
            <input
              type="text"
              id="editar-aluno-nome"
              placeholder="Ariana Grande"
            />
          </label>

          <label for="editar-aluno-matricula"
            >Matrícula
            <input
              type="text"
              id="editar-aluno-matricula"
              placeholder="3456765443"
            />
          </label>
          <label for="editar-aluno-turma"
            >Turma
            <select id="editar-aluno-turma" required>
              <option value="" disabled selected>Selecione a turma</option>
            </select>
          </label>

          <div class="admin-modal-botoes">
            <button type="submit">Salvar</button>
            <button type="button" class="cancelar-alteracoes">Cancelar</button>
          </div>
        </form>
      </div>
    </div>

    <div class="admin-modal modal-adicionar" id="modal-adicionar-aluno">
      <div>
        <div class="admin-modal-header">
          <h3>Adicionar Aluno</h3>
          <button type="button" class="fechar-modal">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <form class="admin-modal-content">
          <label for="adicionar-aluno-matricula"
            >Matrícula
            <input
              type="text"
              id="adicionar-aluno-matricula"
              placeholder="Matrícula"
              required
            />
          </label>

          <label for="adicionar-aluno-turma"
            >Turma
            <select id="adicionar-aluno-turma" required>
              <option value="" disabled selected>Selecione a turma</option>
            </select>
          </label>

          <div class="admin-modal-botoes">
            <button type="submit">Adicionar</button>
            <button type="button" class="cancelar-alteracoes">Cancelar</button>
          </div>
        </form>
      </div>
    </div>

    <div class="admin-modal modal-excluir" id="modal-excluir-aluno">
      <div>
        <div class="admin-modal-header">
          <h3>Excluir Aluno</h3>
          <button class="fechar-modal">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="admin-modal-content">
          <p style="font-size: 2rem; margin-top: 2rem; margin-left: 1rem">
            Deseja excluir o aluno?
          </p>

          <div class="admin-modal-botoes">
            <button type="button" id="btn-confirmar-excluir">Excluir</button>
            <button type="button" class="cancelar-alteracoes">Cancelar</button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://kit.fontawesome.com/02db64e304.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../../assets/js/adminAlunos.js"></script>
  </body>
</html>
