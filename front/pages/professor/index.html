<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Professor</title>
    <link rel="stylesheet" href="../../assets/css/profHome.css" />
    <link rel="stylesheet" href="../../assets/css/globals.css" />
    <link
      rel="icon"
      href="../../assets/images/Group 14.svg"
      type="image/x-icon"
    />
  </head>
  <body>
    <header>
      <div>
        <img src="../../assets/images/Group 14.svg" alt="" />
        <ul>
          <li class="aba-professor-ativa"><a href="">Minha disciplina</a></li>
          <li><a href="selecionarTurma.html?tipo=obs">Observações</a></li>
          <li><a href="selecionarTurma.html?tipo=notas">Notas lançadas</a></li>
        </ul>
      </div>
      <a href="../../index.html" class="btn-sair" id="btn-sair" onclick="localStorage.clear()">
        <i class="fa-solid fa-right-from-bracket"></i> Sair
      </a>
    </header>

    <main>
      <section>
        <div id="professor-overview">
          <div>
            <h1 id="materia-professor"></h1>
            <p id="nome-professor"></p>
          </div>
          <button id="editar-perfil">Editar Perfil</button>
        </div>

        <div id="dashboard">
          <div class="dashboard-card">
            <div>
              <h2>Total de Alunos</h2>
              <p id="total-alunos"></p>
            </div>
          </div>

          <div class="dashboard-card">
            <div>
              <h2>Média de Notas</h2>
              <p id="media-notas"></p>
            </div>
          </div>

          <div class="dashboard-card">
            <div>
              <h2>Total de Observações</h2>
              <p id="total-observacoes"></p>
            </div>
          </div>
        </div>

        <div id="botoes-home">
          <button
            id="add-nota"
            onclick="document.location.href = 'selecionarTurma.html?tipo=notas'"
          >
            Adicionar Notas
          </button>
          <button
            id="add-obs"
            onclick="document.location.href = 'selecionarTurma.html?tipo=obs'"
          >
            Adicionar Observações
          </button>
        </div>
      </section>

      <img
        id="img-direita-bottom"
        src="../../assets/images/Group 21.svg"
        alt=""
      />
    </main>

    <div id="editar-perfil-modal">
      <div id="editar-perfil-modal-content">
        <div>
          <h3>Editar Perfil</h3>
          <button id="fechar-modal"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div>
          <form>
            <div id="form-inputs">
              <div>
                <h4>José Pereira</h4>
                <p>Literatura</p>
              </div>

              <div>
                <div>
                  <label for="usuario">
                    Usuário
                    <input type="text" id="usuario" disabled />
                  </label>
                </div>

                <div>
                  <label for="senha">
                    Senha
                    <input type="password" id="senha" disabled />
                  </label>
                </div>
              </div>
            </div>
            <div id="editar-perfil-modal-footer">
              <button id="salvar-alteracoes-btn">Salvar Alterações</button>
              <button id="cancelar-alteracoes-btn">Cancelar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script
      src="https://kit.fontawesome.com/02db64e304.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../../assets/js/profHome.js"></script>
  </body>
</html>
