<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Observações - Aluno</title>
    <link rel="stylesheet" href="../../assets/css/globals.css" />
    <link rel="stylesheet" href="../../assets/css/alunoObs.css" />
    <link rel="icon" href="../../assets/images/Group 14.svg" type="image/x-icon">
  </head>

  <body>
    <header style="background-color: var(--azul)">
      <div>
        <img src="../../assets/images/Group 14.svg" alt="" />
        <ul>
          <li><a href="../disciplinas.html">Disciplinas</a></li>
          <li id="obs" class="aba-aluno-ativa"><a href="">Observações</a></li>
          <li id="notas"><a href="notasLancadas.html">Notas lançadas</a></li>
        </ul>
      </div>
    </header>

    <main class="aluno-container">
      <div class="aluno-header">
        <h1 class="aluno-titulo">Observações</h1>
      </div>

      <div class="aluno-table-wrapper">
        <table class="aluno-table">
          <thead>
            <tr>
              <th>Nome do Professor</th>
              <th>Matéria</th>
              <th>Observação</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </main>

    <div class="observacoes-modal">
      <div>
        <div class="observacoes-modal-header">
          <h3>Detalhes da Observação</h3>
          <button class="fechar-modal">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="observacoes-modal-content">
          <p><strong>Professor:</strong><span id="modal-professor"></span></p>
          <p><strong>Disciplina:</strong><span id="modal-materia"></span></p>
          <p>
            <strong>Observação completa:</strong><span id="modal-texto"></span>
          </p>

          <div class="observacoes-modal-botoes">
            <button class="fechar-modal">Fechar</button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://kit.fontawesome.com/02db64e304.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="../../assets/js/alunoObs.js"></script>
  </body>
</html>
